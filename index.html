<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mi Pana 26 · Tu Álbum Mundial</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E⚽%3C/text%3E%3C/svg%3E" />

    <!--
      Security headers — GitHub Pages does not support custom HTTP headers.
      The service worker (sw.js) injects the real HTTP headers that browsers
      require on the response (X-Frame-Options, frame-ancestors CSP, etc.).
      The meta tags below act as a fallback for browsers without SW support.
    -->

    <!-- Prevent MIME-type sniffing (meta fallback; SW sets the real header) -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />

    <!--
      Content Security Policy meta fallback.
      Note: frame-ancestors is intentionally omitted here — browsers ignore
      it in meta tags. The SW sets it as a real HTTP header instead.
    -->
    <meta http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; connect-src 'self' https://*.supabase.co wss://*.supabase.co; img-src 'self' data:; font-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self';" />

    <!-- Don't send Referer header to third-party origins -->
    <meta name="referrer" content="strict-origin-when-cross-origin" />
  </head>
  <body style="margin: 0; background: #FFFFFF;">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <!-- Register security-headers service worker -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function () {
          navigator.serviceWorker.register('/mi-pana/sw.js');
        });
      }
    </script>
  </body>
</html>
